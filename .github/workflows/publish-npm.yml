# .github/workflows/publish-npm.yml
# Publish skilltags to npm automatically when a GitHub release is published.
name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v2.1.1
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
        run: |
          node <<'EOF'
          const pkg = require('./package.json');
          const expected = `v${pkg.version}`;

          if (process.env.RELEASE_TAG !== expected) {
            console.error(`Release tag ${process.env.RELEASE_TAG} does not match package.json version ${expected}.`);
            process.exit(1);
          }
          EOF

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance
